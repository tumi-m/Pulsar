name: Pulsar — Daily Ingest

on:
  # Run daily at 08:00 UTC
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ingest:
    name: Ingest new releases
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Only run the ingest when Supabase is configured. If the secret is
      # missing the step is skipped and the job still succeeds — so GitHub
      # never emails a failure for an unconfigured repo.
      - name: Check configuration
        id: cfg
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Supabase secrets not set — skipping ingest. The live site still shows fresh music from the Apple feed."
          fi

      - name: Run Pulsar ingest
        if: steps.cfg.outputs.configured == 'true'
        run: npm run ingest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional open-model curation via Ollama Cloud/Turbo. A local
          # Ollama is NOT reachable from GitHub runners; leave these unset to
          # skip enrichment (releases are still saved), or set them to a cloud
          # endpoint to enrich in the daily job.
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
